server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    
    gzip on;
    gzip_types text/html text/css application/javascript;
    
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Video files - set content type
    location ~* \.(mp4|webm)$ {
        add_header Accept-Ranges bytes;
    }
}
